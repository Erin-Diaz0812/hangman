<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hangman - HackUSU 2026</title>
</head>
<body>

<div id="hero">
    <h1>Welcome to hangman!</h1>

    <p>The purpose behind this website is to act as my project for the HackUSU event in 2026.</p>

    <button onclick="startGame()"> Would you like to start playing? </button>
</div>



<div id="game" style="display: none;">
    <!-- Game section-->
</div>



<div id="stats" style="display: none;">
    <!-- Stats section-->
</div>



<script>
    function startGame() {
      document.getElementById("hero").style.display = "none";
      document.getElementById("game").style.display = "block";
    }
</script>

</body>
</html>
