<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hangman - HackUSU 2026</title>
</head>
<body>

<div id="hero">
    <h1>Welcome to hangman!</h1>

    <p>The purpose behind this website is to act as my project for the HackUSU event in 2026.</p>

    <button onclick="showGame()"> Would you like to start playing? </button>
</div>



<div id="game" style="display: none; background: lightblue;">
    <!-- Game section-->
     <div id="setup">
        <label for="category"> Category: </label>
        <select id="category">
            <option value="all"> Random </option>
            <option value="animal"> Animal </option>
            <option value="dessert"> dessert </option>
            <option value="clothing"> clothing </option>
            <option value="vehicles"> vehicles </option>
            <option value="foreign word"> foreign word </option>
        </select>

        <label for="wordLength"> Word Length: </label>
        <select id="wordLength">
            <option value=""> Any </option>
            <option value="3"> 3 </option>
            <option value="4"> 4 </option>
            <option value="5"> 5 </option>
            <option value="6"> 6 </option>
            <option value="7"> 7 </option>
            <option value="8"> 8 </option>
            <option value="9"> 9 </option>
            <option value="10"> 10 </option>
            <option value="11"> 11 </option>
        </select>

        <label for="guessCount"> Guess Count: </label>
        <input type="number" id="guessCount" placeholder="10">

        <button onclick="startGame()">Start Game</button>
        <!--set up: category, word length, guess count, start game button--> 
    </div>

     <div id="board"> 
        <svg id="hangman-svg" viewBox="0 0 200 220" width="200" height="220">
            <!-- Gallows -->
            <line x1="20" y1="210" x2="180" y2="210" stroke="black" stroke-width="4"/>
            <line x1="60" y1="210" x2="60" y2="20" stroke="black" stroke-width="4"/>
            <line x1="60" y1="20" x2="130" y2="20" stroke="black" stroke-width="4"/>
            <line x1="130" y1="20" x2="130" y2="45" stroke="black" stroke-width="4"/>
            <!-- Body parts (hidden by default) -->
            <circle id="h-head" cx="130" cy="60" r="15" stroke="black" stroke-width="4" fill="none" style="display:none"/>
            <line id="h-body" x1="130" y1="75" x2="130" y2="135" stroke="black" stroke-width="4" style="display:none"/>
            <line id="h-left-arm" x1="130" y1="90" x2="100" y2="115" stroke="black" stroke-width="4" style="display:none"/>
            <line id="h-right-arm" x1="130" y1="90" x2="160" y2="115" stroke="black" stroke-width="4" style="display:none"/>
            <line id="h-left-leg" x1="130" y1="135" x2="100" y2="170" stroke="black" stroke-width="4" style="display:none"/>
            <line id="h-right-leg" x1="130" y1="135" x2="160" y2="170" stroke="black" stroke-width="4" style="display:none"/>
        </svg>  
    </div>
     <div id="keyboard"> <!--letter boards --> </div>
     <div id="result"> <!-- words --> </div>

</div>



<div id="stats" style="display: none;">
    <!-- Stats section-->
</div>



<script>
let currentWord = "";
let guessesLeft = 0;
let guessedLetters = [];
let wrongGuesses = 0;
let sessionResults = [];

const wordList = [
  { word: "axolotl", category: "animal", length: 7 },
  { word: "fox", category: "animal", length: 3 },
  { word: "shark", category: "animal", length: 5 },
  { word: "cheesecake", category: "dessert", length: 10 },
  { word: "cookie", category: "dessert", length: 6 },
  { word: "jacket", category: "clothing", length: 6 },
  { word: "pants", category: "clothing", length: 5 },
  { word: "sedan", category: "vehicles", length: 5 },
  { word: "origami", category: "foreign word", length: 7 },
  { word: "sushi", category: "foreign word", length: 5 },
];

function filterWords(category, length) {
    let filtered = wordList;
    if (category !== "all") filtered = filtered.filter(w => w.category === category);
    if (length !== "") filtered = filtered.filter(w => w.length === parseInt(length));
    return filtered;
}

function showGame() {
    document.getElementById("hero").style.display = "none";
    document.getElementById("game").style.display = "block";
}

function startGame() {
    const category = document.getElementById("category").value;
    const wordLength = document.getElementById("wordLength").value;
    guessesLeft = parseInt(document.getElementById("guessCount").value) || 10;
    wrongGuesses = 0;
    guessedLetters = [];

    const available = filterWords(category, wordLength);
    if (available.length === 0) {
        alert("No words found with those filters! Try different settings.");
        return;
    }

    const chosen = available[Math.floor(Math.random() * available.length)];
    currentWord = chosen.word;

    document.getElementById("setup").style.display = "none";
    document.getElementById("board").innerHTML = "";
    document.getElementById("result").innerHTML = "";

    displayWord();
    buildKeyboard();
    enableKeyboardTyping();
}

function displayWord() {
    const boardDiv = document.getElementById("board");
    boardDiv.innerHTML = currentWord.split("").map(letter => {
        return guessedLetters.includes(letter)
            ? `<span class="blank">${letter}</span>`
            : `<span class="blank">_</span>`;
    }).join(" ");
}

function buildKeyboard() {
    const keyboardDiv = document.getElementById("keyboard");
    keyboardDiv.innerHTML = "";
    "abcdefghijklmnopqrstuvwxyz".split("").forEach(letter => {
        const btn = document.createElement("button");
        btn.textContent = letter;
        btn.id = "key-" + letter;
        btn.onclick = () => guessLetter(letter);
        keyboardDiv.appendChild(btn);
    });
}

const hangmanParts = ["h-head", "h-body", "h-left-arm", "h-right-arm", "h-left-leg", "h-right-leg"];

function updateHangman() {
    if (wrongGuesses <= hangmanParts.length) {
        document.getElementById(hangmanParts[wrongGuesses - 1]).style.display = "block";
    }
}

function enableKeyboardTyping() {
    document.onkeydown = function(e) {
        const letter = e.key.toLowerCase();
        if (/^[a-z]$/.test(letter)) {
            guessLetter(letter);
        }
    };
}

function disableKeyboardTyping() {
    document.onkeydown = null;
}

function guessLetter(letter) {
    if (guessedLetters.includes(letter)) return;
    guessedLetters.push(letter);

    const keyBtn = document.getElementById("key-" + letter);
    if (currentWord.includes(letter)) {
        keyBtn.style.background = "green";
        keyBtn.style.color = "white";
    } else {
        guessesLeft--;
        wrongGuesses++;
        updateHangman();
        keyBtn.style.background = "red";
        keyBtn.style.color = "white";
    }
    keyBtn.disabled = true;

    displayWord();
    checkResult();
}

function checkResult() {
    const resultDiv = document.getElementById("result");
    const allRevealed = currentWord.split("").every(l => guessedLetters.includes(l));

    if (allRevealed) {
        disableKeyboardTyping();
        logResult("win");
        resultDiv.innerHTML = "<p>You win! The word was: " + currentWord + "</p><button onclick='resetGame()'>Play Again</button>";
    } else if (guessesLeft <= 0) {
        disableKeyboardTyping();
        logResult("loss");
        resultDiv.innerHTML = "<p>You lose! The word was: " + currentWord + "</p><button onclick='resetGame()'>Play Again</button>";
    } else {
        resultDiv.innerHTML = "<p>Guesses left: " + guessesLeft + "</p>";
    }
}
}

function logResult(outcome) {
    const totalGuesses = parseInt(document.getElementById("guessCount").value) || 10;
    const category = document.getElementById("category").value;

    sessionResults.push({
        word: currentWord,
        category: category,
        word_length: currentWord.length,
        total_guesses_allowed: totalGuesses,
        wrong_guesses: wrongGuesses,
        correct_guesses: guessedLetters.filter(l => currentWord.includes(l)).length,
        outcome: outcome,
        letters_guessed: guessedLetters.join(""),
        date: new Date().toLocaleDateString()
    });

    if (sessionResults.length >= 10) {
        downloadCSV();
    }
}

function downloadCSV() {
    const headers = ["word","category","word_length","total_guesses_allowed","wrong_guesses","correct_guesses","outcome","letters_guessed","date"];
    const rows = sessionResults.map(r => headers.map(h => r[h]).join(","));
    const csvContent = [headers.join(","), ...rows].join("\n");

    const blob = new Blob([csvContent], { type: "text/csv" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = "hangman_results.csv";
    a.click();
    URL.revokeObjectURL(url);

    sessionResults = [];
}

function resetGame() {
    disableKeyboardTyping();
    document.getElementById("setup").style.display = "block";
    document.getElementById("board").innerHTML = "";
    document.getElementById("keyboard").innerHTML = "";
    document.getElementById("result").innerHTML = "";
}
</script>
</body>
</html>
